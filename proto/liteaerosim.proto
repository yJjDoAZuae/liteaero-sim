syntax = "proto3";
package las_proto;

// ---------------------------------------------------------------------------
// Supporting scalar types
// ---------------------------------------------------------------------------

message Vector3f {
    float x = 1;
    float y = 2;
    float z = 3;
}

message Quaternionf {
    float w = 1;
    float x = 2;
    float y = 3;
    float z = 4;
}

message WGS84Datum {
    double latitude_rad  = 1;
    double longitude_rad = 2;
    float  altitude_m    = 3;
}

// ---------------------------------------------------------------------------
// KinematicState snapshot — all 14 primary state fields
// ---------------------------------------------------------------------------
message KinematicState {
    int32       schema_version       = 1;
    double      time_sec             = 2;
    WGS84Datum  position             = 3;
    Vector3f    velocity_ned_mps     = 4;
    Vector3f    acceleration_ned_mps = 5;
    Quaternionf q_nw                 = 6;
    Quaternionf q_nb                 = 7;
    Vector3f    rates_body_rps       = 8;
    Vector3f    wind_ned_mps         = 9;
    float       alpha_rad            = 10;
    float       beta_rad             = 11;
    float       alpha_dot_rps        = 12;
    float       beta_dot_rps         = 13;
    float       roll_rate_wind_rps   = 14;
}

// ---------------------------------------------------------------------------
// LiftCurveModel — configuration parameters only (model is stateless)
// ---------------------------------------------------------------------------
message LiftCurveParams {
    int32 schema_version        = 1;
    float cl_alpha              = 2;
    float cl_max                = 3;
    float cl_min                = 4;
    float delta_alpha_stall     = 5;
    float delta_alpha_stall_neg = 6;
    float cl_sep                = 7;
    float cl_sep_neg            = 8;
}

// ---------------------------------------------------------------------------
// LoadFactorAllocator — configuration + Newton warm-start state
// Note: the LiftCurveModel reference (_lift) is NOT included; callers must
// construct LoadFactorAllocator with a matching LiftCurveModel before calling
// deserializeProto().
// ---------------------------------------------------------------------------
message LoadFactorAllocatorState {
    int32 schema_version = 1;
    float s_ref_m2       = 2;
    float cl_y_beta      = 3;
    float alpha_prev_rad = 4;
    float beta_prev_rad  = 5;
    float n_z_prev_nd    = 6;
    float n_y_prev_nd    = 7;
}

// ---------------------------------------------------------------------------
// AirframePerformance — configuration parameters only (stateless struct)
// ---------------------------------------------------------------------------
message AirframePerformanceParams {
    int32 schema_version = 1;
    float g_max_nd       = 2;
    float g_min_nd       = 3;
    float tas_max_mps    = 4;
    float mach_max_nd    = 5;
}

// ---------------------------------------------------------------------------
// Inertia — configuration parameters only (stateless struct)
// ---------------------------------------------------------------------------
message InertiaParams {
    int32 schema_version = 1;
    float mass_kg        = 2;
    float ixx_kgm2       = 3;
    float iyy_kgm2       = 4;
    float izz_kgm2       = 5;
}

// ---------------------------------------------------------------------------
// AeroPerformance — configuration parameters only (model is stateless)
// ---------------------------------------------------------------------------
message AeroPerformanceParams {
    int32 schema_version = 1;
    float s_ref_m2       = 2;
    float ar             = 3;
    float e              = 4;
    float cd0            = 5;
    float cl_y_beta      = 6;
    float cl_q_nd        = 7;   // pitch-rate damping derivative C_Lq (rad⁻¹)
    float mac_m          = 8;   // mean aerodynamic chord (m)
    float cy_r_nd        = 9;   // yaw-rate lateral force derivative C_Yr (rad⁻¹)
    float fin_arm_m      = 10;  // vertical tail moment arm (m)
}

// ---------------------------------------------------------------------------
// PropulsionJetState — warm-start state for PropulsionJet
// ---------------------------------------------------------------------------
message PropulsionJetState {
    int32          schema_version = 1;
    float          thrust_n       = 2;
    bool           ab_active      = 3;
    repeated float spool_state    = 4;  // FilterSS2Clip state vector x: [x[0], x[1]]
    repeated float ab_state       = 5;  // FilterSS2Clip state vector x: [x[0], x[1]]
}

// ---------------------------------------------------------------------------
// PropulsionEdfState — warm-start state for PropulsionEDF
// ---------------------------------------------------------------------------
message PropulsionEdfState {
    int32          schema_version = 1;
    float          thrust_n       = 2;
    repeated float spool_state    = 3;  // FilterSS2Clip state vector x: [x[0], x[1]]
}

// ---------------------------------------------------------------------------
// PropulsionPropState — warm-start state for PropulsionProp
// ---------------------------------------------------------------------------
message PropulsionPropState {
    int32          schema_version = 1;
    float          thrust_n       = 2;
    repeated float rotor_state    = 3;  // FilterSS2Clip state vector x: [x[0], x[1]]
}

// ---------------------------------------------------------------------------
// FloatArray — lightweight log message for float-vector log sources.
// Used by LogSource (float-array variant) as the MCAP message schema.
// ---------------------------------------------------------------------------
message FloatArray {
    repeated float values = 1;
}

// ---------------------------------------------------------------------------
// AtmosphereConfigParams — configuration for Atmosphere (stateless model)
// ---------------------------------------------------------------------------
message AtmosphereConfigParams {
    int32 schema_version       = 1;
    float delta_temperature_k  = 2;
    float relative_humidity_nd = 3;
    float surface_pressure_pa  = 4;   // actual sea-level pressure (Pa); 0 = use ISA default 101325
}

// ---------------------------------------------------------------------------
// WindConfigParams — configuration for Wind (stateless model)
// profile: 0=Constant, 1=PowerLaw, 2=Logarithmic (WindConfig::Profile cast to int32)
// ---------------------------------------------------------------------------
message WindConfigParams {
    int32    schema_version       = 1;
    Vector3f direction_ned_unit   = 2;
    float    speed_mps            = 3;
    float    reference_altitude_m = 4;
    int32    profile              = 5;
    float    hellmann_alpha_nd    = 6;
    float    roughness_length_m   = 7;
}

// ---------------------------------------------------------------------------
// TurbulenceState — config + Dryden filter warm-start state
// intensity: 0=None, 1=Light, 2=Moderate, 3=Severe (TurbulenceIntensity cast to int32)
// Six 2-element state arrays: u, v, w (translational), p, q, r (angular).
// ---------------------------------------------------------------------------
message TurbulenceState {
    int32          schema_version = 1;
    int32          intensity      = 2;
    float          wingspan_m     = 3;
    float          dt_s           = 4;
    uint32         seed           = 5;
    repeated float state_u        = 6;
    repeated float state_v        = 7;
    repeated float state_w        = 8;
    repeated float state_p        = 9;
    repeated float state_q        = 10;
    repeated float state_r        = 11;
}

// ---------------------------------------------------------------------------
// AircraftState — full restart snapshot for Aircraft
// ---------------------------------------------------------------------------
message AircraftState {
    int32                     schema_version   = 1;
    KinematicState            kinematic_state  = 2;
    KinematicState            initial_state    = 3;
    LoadFactorAllocatorState  allocator        = 4;
    LiftCurveParams           lift_curve       = 5;
    AeroPerformanceParams     aero_performance = 6;
    AirframePerformanceParams airframe         = 7;
    InertiaParams             inertia          = 8;
    float          cmd_filter_dt_s      = 12;
    float          nz_wn_rad_s          = 13;
    repeated float nz_filter_x          = 14;
    repeated float ny_filter_x          = 15;
    int32          cmd_filter_substeps  = 16;
    float          nz_zeta_nd           = 17;
    repeated float roll_rate_filter_x   = 18;
    float          ny_wn_rad_s          = 19;
    float          ny_zeta_nd           = 20;
    float          roll_rate_wn_rad_s   = 21;
    float          roll_rate_zeta_nd    = 22;
    oneof propulsion {
        PropulsionJetState  jet  = 9;
        PropulsionEdfState  edf  = 10;
        PropulsionPropState prop = 11;
    }
}

// ---------------------------------------------------------------------------
// Terrain — TerrainTile and TerrainMesh serialization (Step 10)
// ---------------------------------------------------------------------------

message TerrainTileProto {
    int32          schema_version    = 1;
    int32          lod               = 2;
    double         centroid_lat_rad  = 3;
    double         centroid_lon_rad  = 4;
    float          centroid_height_m = 5;
    double         lat_min_rad       = 6;
    double         lat_max_rad       = 7;
    double         lon_min_rad       = 8;
    double         lon_max_rad       = 9;
    float          height_min_m      = 10;
    float          height_max_m      = 11;
    repeated float vertices          = 12;  // packed: east0,north0,up0, east1,...
    repeated uint32 indices          = 13;  // 3 per facet
    repeated uint32 colors           = 14;  // packed R8G8B8 per facet (upper byte unused)
}

message TerrainMeshProto {
    int32                    schema_version = 1;
    repeated TerrainTileProto tiles         = 2;
}

message TerrainMeshState {
    int32  schema_version   = 1;
    string las_terrain_path = 2;
    int32  lod_min          = 3;
    int32  lod_max          = 4;
}

// ---------------------------------------------------------------------------
// Game engine integration — TrajectoryFile and SimulationFrame (Step 12)
// ---------------------------------------------------------------------------

// Single frame of a recorded flight trajectory.
message TrajectoryFrame {
    double timestamp_s    = 1;
    double latitude_rad   = 2;
    double longitude_rad  = 3;
    float  height_wgs84_m = 4;
    float  q_w            = 5;  // body-to-NED attitude quaternion
    float  q_x            = 6;
    float  q_y            = 7;
    float  q_z            = 8;
}

// Collection of trajectory frames with a shared world origin.
message TrajectoryFile {
    int32                    schema_version       = 1;
    double                   world_origin_lat_rad = 2;
    double                   world_origin_lon_rad = 3;
    float                    world_origin_h_m     = 4;
    repeated TrajectoryFrame frames               = 5;
}

// ---------------------------------------------------------------------------
// Air data system — SensorAirData config and state
// ---------------------------------------------------------------------------

message AirDataConfig {
    int32  schema_version                  = 1;
    float  differential_pressure_noise_pa  = 2;
    float  static_pressure_noise_pa        = 3;
    float  differential_pressure_lag_tau_s = 4;
    float  static_pressure_lag_tau_s       = 5;
    float  static_pressure_bias_pa         = 6;
    float  oat_noise_k                     = 7;
    uint32 seed                            = 8;
    float  static_port_angle_rad           = 9;
    float  initial_kollsman_pa             = 10;
    float  dt_s                            = 11;
}

message AirDataStateProto {
    int32  schema_version    = 1;
    float  qc_lag_state      = 2;
    float  qc_lag_prev_input = 3;
    float  ps_lag_state      = 4;
    float  ps_lag_prev_input = 5;
    uint64 rng_advance       = 6;  // number of variate draws since the seed was set
    float  kollsman_pa       = 7;  // current altimeter QNH setting at checkpoint time
    uint32 rng_seed          = 8;  // seed used to initialize the RNG engine
}

// ---------------------------------------------------------------------------
// Landing Gear — per-wheel state, contact forces, and full gear state
// ---------------------------------------------------------------------------

message WheelUnitState {
    float strut_deflection_m        = 1;
    float strut_deflection_rate_mps = 2;
    float wheel_speed_rps           = 3;
}

message ContactForcesState {
    int32    schema_version    = 1;
    Vector3f force_body_n      = 2;
    Vector3f moment_body_nm    = 3;
    bool     weight_on_wheels  = 4;
}

message LandingGearState {
    int32                    schema_version = 1;
    repeated WheelUnitState  wheel_units    = 2;
}

// ---------------------------------------------------------------------------
// Live simulation broadcast — SimulationFrameProto (Step LS-1)
// Extends TrajectoryFrame (fields 1–8) with velocity fields (9–11).
// Sent as a UDP datagram by UdpSimulationBroadcaster after each SimRunner step.
// ---------------------------------------------------------------------------

message SimulationFrameProto {
    double timestamp_s         = 1;
    double latitude_rad        = 2;
    double longitude_rad       = 3;
    float  height_wgs84_m      = 4;
    float  q_w                 = 5;  // body-to-NED attitude quaternion
    float  q_x                 = 6;
    float  q_y                 = 7;
    float  q_z                 = 8;
    float  velocity_north_mps  = 9;
    float  velocity_east_mps   = 10;
    float  velocity_down_mps   = 11;
}

// ---------------------------------------------------------------------------
// Manual input — AircraftCommand and ManualInputFrame serialization
// ---------------------------------------------------------------------------

message AircraftCommandProto {
    int32 schema_version      = 1;
    float n_z                 = 2;  // commanded normal load factor (g)
    float n_y                 = 3;  // commanded lateral load factor (g)
    float roll_rate_wind_rps  = 4;  // commanded wind-frame roll rate (rad/s)
    float throttle_nd         = 5;  // normalized throttle [0, 1]
}

message ManualInputFrameProto {
    int32                schema_version = 1;
    AircraftCommandProto command        = 2;
    uint32               actions        = 3;  // bitmask of InputAction flags
    bool                 connected      = 4;  // joystick connection state
}
