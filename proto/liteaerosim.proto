syntax = "proto3";
package las_proto;

// ---------------------------------------------------------------------------
// Supporting scalar types
// ---------------------------------------------------------------------------

message Vector3f {
    float x = 1;
    float y = 2;
    float z = 3;
}

message Quaternionf {
    float w = 1;
    float x = 2;
    float y = 3;
    float z = 4;
}

message WGS84Datum {
    double latitude_rad  = 1;
    double longitude_rad = 2;
    float  altitude_m    = 3;
}

// ---------------------------------------------------------------------------
// KinematicState snapshot — all 14 primary state fields
// ---------------------------------------------------------------------------
message KinematicState {
    int32       schema_version       = 1;
    double      time_sec             = 2;
    WGS84Datum  position             = 3;
    Vector3f    velocity_ned_mps     = 4;
    Vector3f    acceleration_ned_mps = 5;
    Quaternionf q_nw                 = 6;
    Quaternionf q_nb                 = 7;
    Vector3f    rates_body_rps       = 8;
    Vector3f    wind_ned_mps         = 9;
    float       alpha_rad            = 10;
    float       beta_rad             = 11;
    float       alpha_dot_rps        = 12;
    float       beta_dot_rps         = 13;
    float       roll_rate_wind_rps   = 14;
}

// ---------------------------------------------------------------------------
// LiftCurveModel — configuration parameters only (model is stateless)
// ---------------------------------------------------------------------------
message LiftCurveParams {
    int32 schema_version        = 1;
    float cl_alpha              = 2;
    float cl_max                = 3;
    float cl_min                = 4;
    float delta_alpha_stall     = 5;
    float delta_alpha_stall_neg = 6;
    float cl_sep                = 7;
    float cl_sep_neg            = 8;
}

// ---------------------------------------------------------------------------
// LoadFactorAllocator — configuration + Newton warm-start state
// Note: the LiftCurveModel reference (_lift) is NOT included; callers must
// construct LoadFactorAllocator with a matching LiftCurveModel before calling
// deserializeProto().
// ---------------------------------------------------------------------------
message LoadFactorAllocatorState {
    int32 schema_version = 1;
    float s_ref_m2       = 2;
    float cl_y_beta      = 3;
    float alpha_prev_rad = 4;
    float beta_prev_rad  = 5;
}

// ---------------------------------------------------------------------------
// AirframePerformance — configuration parameters only (stateless struct)
// ---------------------------------------------------------------------------
message AirframePerformanceParams {
    int32 schema_version = 1;
    float g_max_nd       = 2;
    float g_min_nd       = 3;
    float tas_max_mps    = 4;
    float mach_max_nd    = 5;
}

// ---------------------------------------------------------------------------
// Inertia — configuration parameters only (stateless struct)
// ---------------------------------------------------------------------------
message InertiaParams {
    int32 schema_version = 1;
    float mass_kg        = 2;
    float ixx_kgm2       = 3;
    float iyy_kgm2       = 4;
    float izz_kgm2       = 5;
}

// ---------------------------------------------------------------------------
// AeroPerformance — configuration parameters only (model is stateless)
// ---------------------------------------------------------------------------
message AeroPerformanceParams {
    int32 schema_version = 1;
    float s_ref_m2       = 2;
    float ar             = 3;
    float e              = 4;
    float cd0            = 5;
    float cl_y_beta      = 6;
    float cl_q_nd        = 7;   // pitch-rate damping derivative C_Lq (rad⁻¹)
    float mac_m          = 8;   // mean aerodynamic chord (m)
    float cy_r_nd        = 9;   // yaw-rate lateral force derivative C_Yr (rad⁻¹)
    float fin_arm_m      = 10;  // vertical tail moment arm (m)
}

// ---------------------------------------------------------------------------
// PropulsionJetState — warm-start state for PropulsionJet
// ---------------------------------------------------------------------------
message PropulsionJetState {
    int32          schema_version = 1;
    float          thrust_n       = 2;
    bool           ab_active      = 3;
    repeated float spool_state    = 4;  // FilterSS2Clip state vector x: [x[0], x[1]]
    repeated float ab_state       = 5;  // FilterSS2Clip state vector x: [x[0], x[1]]
}

// ---------------------------------------------------------------------------
// PropulsionEdfState — warm-start state for PropulsionEDF
// ---------------------------------------------------------------------------
message PropulsionEdfState {
    int32          schema_version = 1;
    float          thrust_n       = 2;
    repeated float spool_state    = 3;  // FilterSS2Clip state vector x: [x[0], x[1]]
}

// ---------------------------------------------------------------------------
// PropulsionPropState — warm-start state for PropulsionProp
// ---------------------------------------------------------------------------
message PropulsionPropState {
    int32          schema_version = 1;
    float          thrust_n       = 2;
    repeated float rotor_state    = 3;  // FilterSS2Clip state vector x: [x[0], x[1]]
}

// ---------------------------------------------------------------------------
// FloatArray — lightweight log message for float-vector log sources.
// Used by LogSource (float-array variant) as the MCAP message schema.
// ---------------------------------------------------------------------------
message FloatArray {
    repeated float values = 1;
}

// ---------------------------------------------------------------------------
// AtmosphereConfigParams — configuration for Atmosphere (stateless model)
// ---------------------------------------------------------------------------
message AtmosphereConfigParams {
    int32 schema_version       = 1;
    float delta_temperature_k  = 2;
    float relative_humidity_nd = 3;
}

// ---------------------------------------------------------------------------
// WindConfigParams — configuration for Wind (stateless model)
// profile: 0=Constant, 1=PowerLaw, 2=Logarithmic (WindConfig::Profile cast to int32)
// ---------------------------------------------------------------------------
message WindConfigParams {
    int32    schema_version       = 1;
    Vector3f direction_ned_unit   = 2;
    float    speed_mps            = 3;
    float    reference_altitude_m = 4;
    int32    profile              = 5;
    float    hellmann_alpha_nd    = 6;
    float    roughness_length_m   = 7;
}

// ---------------------------------------------------------------------------
// TurbulenceState — config + Dryden filter warm-start state
// intensity: 0=None, 1=Light, 2=Moderate, 3=Severe (TurbulenceIntensity cast to int32)
// Six 2-element state arrays: u, v, w (translational), p, q, r (angular).
// ---------------------------------------------------------------------------
message TurbulenceState {
    int32          schema_version = 1;
    int32          intensity      = 2;
    float          wingspan_m     = 3;
    float          dt_s           = 4;
    uint32         seed           = 5;
    repeated float state_u        = 6;
    repeated float state_v        = 7;
    repeated float state_w        = 8;
    repeated float state_p        = 9;
    repeated float state_q        = 10;
    repeated float state_r        = 11;
}

// ---------------------------------------------------------------------------
// AircraftState — full restart snapshot for Aircraft
// ---------------------------------------------------------------------------
message AircraftState {
    int32                     schema_version   = 1;
    KinematicState            kinematic_state  = 2;
    KinematicState            initial_state    = 3;
    LoadFactorAllocatorState  allocator        = 4;
    LiftCurveParams           lift_curve       = 5;
    AeroPerformanceParams     aero_performance = 6;
    AirframePerformanceParams airframe         = 7;
    InertiaParams             inertia          = 8;
    oneof propulsion {
        PropulsionJetState  jet  = 9;
        PropulsionEdfState  edf  = 10;
        PropulsionPropState prop = 11;
    }
}
